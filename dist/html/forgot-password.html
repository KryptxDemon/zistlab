<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - ZIST</title>
  <script type="module" crossorigin src="/assets/navbar-99QUXTmQ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/navbar-iXG2ozy1.css">
  <link rel="stylesheet" crossorigin href="/assets/forgotPassword-tn0RQdqM.css">
</head>
  <body>
    <main class="forgot-shell">
      <a href="./login.html" class="back-link">Back to login</a>

      <section class="forgot-card">
        <div class="brand">ZIST</div>
        <h1>Reset your password</h1>
        <p>We will send a reset link to your email.</p>

        <form class="forgot-form" action="./login.html" method="get">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
          <button type="submit">Send reset link</button>
        </form>
      </section>
    </main>
</body>
</html>
